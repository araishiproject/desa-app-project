version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: desa_app_mongodb
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db
    networks:
      - desa_app_network

  redis:
    image: redis:7-alpine
    container_name: desa_app_redis
    ports:
      - '6379:6379'
    networks:
      - desa_app_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: desa_app_backend
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password@mongodb:27017/desa_app?authSource=admin
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
    networks:
      - desa_app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: desa_app_frontend
    ports:
      - '3000:3000'
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    networks:
      - desa_app_network

volumes:
  mongo_data:

networks:
  desa_app_network:
    driver: bridge
